<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    
    <link rel="stylesheet" href="../estilos/style.css">
    <link rel="stylesheet" href="../estilos/cadastro.css">
    <link rel="stylesheet" href="../estilos/telas-pequenas.css" media="screen and (max-width: 768px)">
</head>
<body id="cadastro-body">
    <main>
        <article id="container">
            <section id="imagem">
                <img src="../images/logo.png" alt="" id="logo">
            </section>
            <section id="cadastro">
                
                <article id="field">

                    <div>
                        <h1>Crie uma conta</h1>
                        <p>Se registre para poder utilizar todos os recursos da plataforma.</p>
                    </div>

                    <form action="Cadastro.py" method="post">
                        <div>
                            <label for="iname">Primeiro nome</label>
                           
                            <div class="write-container">
                                <input type="text" name="name" id="iname" class="write" placeholder="Seu primeiro nome" required></div>

                            <label for="isurname">Último nome</label>
                            <div class="write-container">
                                <input type="text" name="surname" id="isurname" class="write"  placeholder="Seu último nome" required></div>
                        </div>
                        <div>
                            <label for="itel">Telefone</label>
                            
                            <div class="write-container">
                                <input type="tel" name="tel" id="itel" class="write" placeholder="(XX) XXXXX-XXXX" required minlength="11" maxlength="11"></div>
                            <label for="iemail">Email</label>
                            <div class="write-container">
                                <input type="email" name="email" id="iemail" class="write" placeholder="Seu email" required></div>
                            
                        </div>
                        <div>
                            <label for="ipass">Senha</label>
                            <div class="write-container">
                                
                                <input type="password" name="pass" id="ipass" class="write" required>
                            </div>
                            <label for="irpass">Repita a senha</label>
                            <div class="write-container">
                                <input type="password" name="rpass" id="irpass" class="write" required minlength="8">
                                
                            </div>
                            
                        </div>
                        
                            <p id="error"></p>
                    
                        <input type="submit" value="Registar" id="submit-button">
                    </form>

                    <div id="more-options">
                        <p>Já tem uma conta? <a href="../index.html">Ir para login.</a></p>
                    </div>
                </div>
            </section>
        </article>
    </main>
    <script src="https://kit.fontawesome.com/ba5849ca46.js" crossorigin="anonymous"></script>
    <script src="../scripts/cadastro.js"></script>
</body>
</html>
