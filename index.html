<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="estilos/login.css">
    <link rel="stylesheet" href="../estilos/style.css">
    <link rel="stylesheet" href="estilos/telas-pequenas.css" media="screen and (max-width: 768px)">
</head>
<body id="index-body">
    <main> 
        <section id="container"> 
            
            <section id="image-section">
                <div id="fundo-login">
                    <img src="images/login-mobile.png" alt="" id="fundo">
                    <img src="images/logo.png" alt="" id="logo">
                </div>
                <div id="credito">
                    <div><img src="" alt=""></div>
                    <div></div>
                </div>
            </section>
            <section id="form-section">
                <article id="field">
                    <div>
                        <h1>Bem-Vindo</h1>
                        <p>Faça login para acessar os dados da sua conta e utilizar a plataforma.</p>
                    </div>
            
                    <form action="Login.py" method="post">
                        <div>
                            <label for="iemail">Email</label>
                            <div class="write-container">
                                <div class="icon">
                                    <i class="fa-solid fa-at"></i>
                                </div>
                                <input type="email" name="email" id="iemail" class="write" placeholder="Coloque seu email" required>
                            </div>
                        </div>

                        <div >
                            <label for="isenha">Senha</label>
                            <div class="write-container">
                                <div class="icon">
                                    <i class="fa-solid fa-key"></i>
                                </div>
                                <input type="password" name="senha" id="ipass" class="write" placeholder="Coloque sua senha" required>
                                <div id="hide"><i class="fa-solid fa-eye"></i></div>
                            </div>
                            
                        </div>

                        <div id="more-options">
                            <div>
                                <input type="checkbox" name="" id="iremember" value="true">
                                <label for="iremember" id="remember-label">Mantenha-me conectado</label>
                            </div>
                            <a href="pages/forgot.html" id="forgot-link">Enqueci a senha</a>   
                        </div>

                        <div>
                            <input type="submit" value="Entrar" id="submit-button">
                        </div>
                    </form>

                    <div  id="more-options">
                        <p>Ainda não tem uma conta? <a href="pages/cadastro.html">Cadastre-se</a></p>
                    </div>
                </article>
            </section>
        </section>
    </main>

    <script src="https://kit.fontawesome.com/ba5849ca46.js" crossorigin="anonymous"></script>
    <script src="scripts/password.js"></script>
</body>
</html>
